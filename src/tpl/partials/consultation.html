<section class="consultation section-offset">
    <div class="container consultation__container">
      <div class="consultation__inner">
        <form class="consultation__form form">
          <h2 class="consultation__title">Бесплатная консультация</h2>
          <p class="consultation__descr">Оставьте данные и мы вам перезвоним!</p>
          <label class="consultation__form-label">
            <input
              type="tel"
              class="consultation__form-input"
              placeholder="+7 (___) ___-__-__"
              required
            />
          </label>
          <p class="consultation__policy">
            Нажимая кнопку я соглашаюсь с
            <a href="#">политикой конфиденциальности</a> и
            <a href="#">пользовательским соглашением</a>
          </p>
          <button
            class="standart-btn primary-btn consultation__form-btn popup-btn"
          >
            Вызвать специалиста
          </button>
        </form>
        <picture class="consultation__picture">
          <img
            class="consultation__img"
            src="assets/img/consultation/consultation.png"
            loading="lazy"
            alt="Врач наркологического центра"
          />
        </picture>
      </div>
    </div>
  </section>
